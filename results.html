<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kết quả học viên</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:Arial,Helvetica,sans-serif;background:#eef4ff;color:#1f2937}.page{min-height:100vh;padding:48px 64px;background:radial-gradient(circle at top left,rgba(59,130,246,.14),transparent 36%),#fff}.top-line{position:fixed;top:0;left:0;height:7px;background:#2563eb;width:100%}.wrap{max-width:1180px;margin:0 auto}.label{display:inline-block;padding:8px 16px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:900;font-size:15px;margin-bottom:16px}h1{font-size:42px;color:#0f172a;margin-bottom:12px}p{font-size:19px;line-height:1.5;color:#475569;margin-bottom:14px}.panel{background:#f8fafc;border:2px solid #e2e8f0;border-radius:24px;padding:22px;margin-top:18px;box-shadow:0 14px 30px rgba(15,23,42,.08)}.row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.row input{border:2px solid #dbeafe;border-radius:999px;padding:12px 14px;font-size:16px;min-width:280px}.btn{border:none;cursor:pointer;border-radius:999px;background:#2563eb;color:#fff;font-weight:850;font-size:15px;padding:12px 18px;box-shadow:0 8px 18px rgba(15,23,42,.16);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;line-height:1}.btn:hover{background:#1d4ed8}.btn.gray{background:#e2e8f0;color:#0f172a}.btn.gray:hover{background:#cbd5e1}.btn.danger{background:#fee2e2;color:#991b1b;box-shadow:none}.btn.danger:hover{background:#fecaca}.btn.small{font-size:13px;font-weight:750;padding:8px 11px;box-shadow:0 4px 10px rgba(15,23,42,.10)}.action-cell{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap}.table-wrap{overflow:auto;margin-top:16px}table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid #d8e2f0;border-radius:18px;overflow:hidden}th{background:linear-gradient(135deg,#1d4ed8,#0ea5e9);color:#fff;text-align:center;padding:13px;font-size:15px;vertical-align:middle}td{border-top:1px solid #e5edf7;padding:12px;font-size:15px;vertical-align:middle;text-align:center;line-height:1.35}tr:nth-child(even) td{background:#f8fbff}.status{font-weight:900;margin-top:10px}.ok{color:#15803d}.err{color:#be123c}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:18px;padding:18px;margin-top:16px;max-height:440px;overflow:auto}@media(max-width:768px){.page{padding:36px 22px}h1{font-size:32px}.row input{width:100%;min-width:0}}
</style>
</head>
<body><div class="top-line"></div><main class="page"><div class="wrap"><div class="label">Student Results</div><h1>Kết quả học viên</h1><p>Nhập mật khẩu giáo viên để xem danh sách bài nộp.</p><div class="panel"><div class="row"><input id="adminPassword" type="password" placeholder="Mật khẩu giáo viên"><button class="btn" onclick="loadResults()">Tải kết quả</button><a class="btn gray" href="index.html">Về trang chủ</a></div><div class="status" id="status"></div><div class="table-wrap"><table><thead><tr><th>Thời gian</th><th>Email</th><th>Điểm</th><th>File JSON</th></tr></thead><tbody id="tbody"></tbody></table></div><pre id="jsonPreview" style="display:none"></pre></div></div></main>
<script>
let results=[];
function setStatus(msg,ok){const el=document.getElementById('status');el.textContent=msg;el.className='status '+(ok?'ok':'err')}
async function loadResults(){
  const pass=document.getElementById('adminPassword').value;
  setStatus('Đang tải...',true);
  try{
    const res=await fetch('/api/results',{headers:{'x-admin-password':pass}});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'Không tải được kết quả');
    results=data.results||[];renderTable();setStatus('Đã tải '+results.length+' bài nộp.',true);
  }catch(e){setStatus(e.message||'Lỗi tải kết quả',false)}
}
function renderTable(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=results.map((r,i)=>{
    const time = r.submittedAt ? new Date(r.submittedAt).toLocaleString('vi-VN') : '';
    return '<tr>'+
      '<td>'+escapeHtml(time)+'</td>'+
      '<td>'+escapeHtml(r.email||'')+'</td>'+
      '<td><b>'+escapeHtml(r.score)+' / '+escapeHtml(r.total)+'</b><br><span>'+escapeHtml(r.percent)+'%</span></td>'+
      '<td><div class="action-cell">'+
        '<button class="btn small" onclick="viewResult('+i+')">Xem JSON</button>'+
        '<button class="btn gray small" onclick="downloadResult('+i+')">Tải</button>'+
        '<button class="btn danger small" onclick="deleteResult('+i+')">Xóa</button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
}
function viewResult(i){const pre=document.getElementById('jsonPreview');pre.style.display='block';pre.textContent=JSON.stringify(results[i].payload||results[i],null,2);pre.scrollIntoView({behavior:'smooth',block:'start'});}
function downloadResult(i){const item=results[i];const blob=new Blob([JSON.stringify(item.payload||item,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(item.filename||('student_result_'+i+'.json'));a.click();URL.revokeObjectURL(url)}
async function deleteResult(i){
  const item=results[i];
  if(!item||!item.id){setStatus('Không tìm thấy ID record để xóa.',false);return;}
  const ok=confirm('Xóa record của '+(item.email||'học viên này')+'? Thao tác này không hoàn tác được.');
  if(!ok)return;
  const pass=document.getElementById('adminPassword').value;
  setStatus('Đang xóa record...',true);
  try{
    const res=await fetch('/api/results?id='+encodeURIComponent(item.id),{method:'DELETE',headers:{'x-admin-password':pass}});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'Không xóa được record');
    results.splice(i,1);
    renderTable();
    const pre=document.getElementById('jsonPreview');
    if(pre.style.display==='block') pre.style.display='none';
    setStatus('Đã xóa record. Còn '+results.length+' bài nộp.',true);
  }catch(e){setStatus(e.message||'Lỗi xóa record',false)}
}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
</script></body></html>
