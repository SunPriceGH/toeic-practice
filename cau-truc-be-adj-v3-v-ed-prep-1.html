<script>

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g,function(s){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s];
  });
}
function formatExplanation(str){
  return escapeHtml(str).replace(/(Cấu trúc đúng là )([^=]+)( =)/, '$1<strong>$2</strong>$3');
}

function renderQuizSlides(){
  const mount=document.getElementById('quizMount');
  if(!mount||mount.dataset.rendered==='1') return;
  mount.outerHTML=quizData.map(function(item,index){
    const optionsHtml=item.options.map(function(opt){
      return '<label class="option"><input name="'+escapeHtml(item.id)+'" type="radio" value="'+escapeHtml(opt.key)+'"><span class="option-letter">'+escapeHtml(opt.key)+'.</span><span>'+escapeHtml(opt.text)+'</span></label>';
    }).join('');
    const translationsHtml=item.options.map(function(opt){
      return '<div class="translation-item"><span class="letter">'+escapeHtml(opt.key)+'.</span><b>'+escapeHtml(opt.text)+'</b> = '+escapeHtml(opt.vn)+' <span class="option-pos">'+escapeHtml(opt.pos)+'</span></div>';
    }).join('');
    const correctOption=item.options.find(opt=>opt.key===item.answer) || {text:''};
    return '<section class="slide quiz-slide'+(index===0?' active':'')+'" data-question="'+escapeHtml(item.id)+'">'
      + '<div class="slide-label">'+escapeHtml(item.label)+'</div>'
      + '<h2>'+escapeHtml(item.title)+'</h2>'
      + '<p class="category-note">'+escapeHtml(item.category)+'</p>'
      + '<div class="content-area">'
      + '<div class="sample-box"><div class="sample-title">Question</div><div class="question">'+escapeHtml(item.questionEn)+'</div><div class="options">'+optionsHtml+'</div></div>'
      + '<div class="method-box result-box" id="result-'+escapeHtml(item.id.replace(/^q/,''))+'"><h3 class="result-title"></h3><p class="explain"><span class="answer-key">Đáp án đúng: '+escapeHtml(item.answer)+'. '+escapeHtml(correctOption.text)+'</span> — '+formatExplanation(item.explanation)+'</p></div>'
      + '<div class="translation-box"><h3>Dịch nghĩa 4 đáp án</h3><div class="translation-list">'+translationsHtml+'</div></div>'
      + '</div></section>';
  }).join('\n') + '\n' + finalResultSlide();
}

const slides=[...document.querySelectorAll('.slide')];
const progressText=document.getElementById('progressText');

const checkBtn=document.getElementById('checkBtn');
let currentSlide=0;
let revealIndex=0;
const checkedAnswers={};
const totalQuestions=quizData.length;
function updateProgress(){
  progressText.textContent=(currentSlide+1)+' / '+slides.length;
  topLine.style.width=((currentSlide+1)/slides.length*100)+'%';
  updateCheckState();
  syncPagePickerActive();
}
function resetSlideReveal(slide){
  slide.querySelectorAll('.reveal').forEach(el=>el.classList.remove('show'));
}
function showSlide(index){
  if(index<0||index>=slides.length) return;
  slides[currentSlide].classList.remove('active');
  resetSlideReveal(slides[currentSlide]);
  currentSlide=index;
  revealIndex=0;
  slides[currentSlide].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  updateProgress();
  if(slides[currentSlide].classList.contains('result-slide')) showFinalResultPreview();
}
function goReveal(){
  const activeSlide=slides[currentSlide];
  const revealItems=activeSlide.querySelectorAll('.reveal');
  if(revealIndex<revealItems.length){
    const item=revealItems[revealIndex];
    item.classList.add('show');
    revealIndex++;
    setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),80);
    return;
  }
}
function nextSlide(){if(currentSlide<slides.length-1)showSlide(currentSlide+1);}
function prevSlide(){if(currentSlide>0)showSlide(currentSlide-1);}
function updateCheckState(){
  const slide=slides[currentSlide];
  const isQuiz=slide.classList.contains('quiz-slide');
  checkBtn.style.display=isQuiz?'inline-block':'none';
}
function lockCurrentQuestion(slide){
  slide.classList.add('answer-locked');
  slide.querySelectorAll('input[type="radio"]').forEach(input=>{
    input.disabled=true;
  });
}

  const title=slide.querySelector('.result-title');
  const translationBox=slide.querySelector('.translation-box');

  if(slide.classList.contains('answer-locked')){
    if(resultBox) resultBox.classList.add('show');
    if(translationBox) translationBox.classList.add('show');
    return;
  }

  if(!selected){
    resultBox.classList.remove('wrong-box');
    resultBox.classList.add('show','no-answer');
    if(translationBox) translationBox.classList.remove('show');
    title.innerHTML='<span class="wrong-text">Hãy chọn một đáp án trước.</span>';
    setTimeout(()=>resultBox.scrollIntoView({behavior:'smooth',block:'center'}),80);
    return;
  }
  resultBox.classList.remove('no-answer');
  const isCorrect=selected.value===answer;
  checkedAnswers[qName]=isCorrect;
  syncPagePickerActive();
  lockCurrentQuestion(slide);
  resultBox.classList.toggle('wrong-box',!isCorrect);
  resultBox.classList.add('show');
  if(translationBox) translationBox.classList.add('show');
  title.innerHTML=isCorrect?'<span class="correct-text">✓ Chính xác!</span>':'<span class="wrong-text">✗ Chưa đúng.</span>';
  setTimeout(()=>resultBox.scrollIntoView({behavior:'smooth',block:'center'}),80);
}

function setupQuestionTranslationButtons(){
  slides.forEach(slide=>{
    if(!slide.classList.contains('quiz-slide')) return;
    const qName=slide.dataset.question;
    const sampleTitle=slide.querySelector('.sample-title');
    const question=slide.querySelector('.question');
    const item=quizDataMap[qName];
    if(!sampleTitle||!question||!item||!item.questionVn) return;
    sampleTitle.classList.add('question-row');
    if(sampleTitle.querySelector('.lang-pill')) return;
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='lang-pill';
    btn.textContent='En | Vn';
    btn.onclick=function(){toggleQuestionTranslation(btn)};
    sampleTitle.appendChild(btn);
    const vn=document.createElement('div');
    vn.className='question-vn';
    vn.innerHTML='<span class="vn-label">VN:</span>'+escapeHtml(item.questionVn);
    question.insertAdjacentElement('afterend',vn);
  });
}
function toggleQuestionTranslation(btn){
  const sampleBox=btn.closest('.sample-box');
  const vn=sampleBox?sampleBox.querySelector('.question-vn'):null;
  if(!vn) return;
  vn.classList.toggle('show');
  btn.classList.toggle('active',vn.classList.contains('show'));
}
function buildPagePicker(){
  const grid=document.getElementById('pagePickerGrid');
  if(!grid||grid.dataset.ready==='1') return;
  slides.forEach((slide,index)=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='page-jump-btn';
    btn.dataset.slideIndex=String(index);
    if(slide.classList.contains('quiz-slide') && slide.dataset.question){
      btn.dataset.questionId=slide.dataset.question;
    }
    const title=(slide.querySelector('h1,h2')?.textContent||'Slide').trim();
    const label=(slide.querySelector('.slide-label')?.textContent||'').trim();
    btn.innerHTML='<span class="page-no">'+(index+1)+'</span><span class="page-title">'+(label||title)+'</span>';
    btn.onclick=function(){showSlide(index);closePagePicker();};
    grid.appendChild(btn);
  });
  grid.dataset.ready='1';
}
function syncPagePickerActive(){
  const buttons=document.querySelectorAll('.page-jump-btn');
  buttons.forEach((btn,i)=>{
    btn.classList.toggle('active',i===currentSlide);
    btn.classList.remove('correct-answer','wrong-answer');
    const qid=btn.dataset.questionId;
    if(qid && Object.prototype.hasOwnProperty.call(checkedAnswers,qid)){
      btn.classList.add(checkedAnswers[qid] ? 'correct-answer' : 'wrong-answer');
    }
  });
}
function openPagePicker(){
  buildPagePicker();
  syncPagePickerActive();
  document.getElementById('pagePicker')?.classList.add('show');
}
function closePagePicker(event){
  if(event&&event.target&&event.target.id!=='pagePicker') return;
  document.getElementById('pagePicker')?.classList.remove('show');
}



const STUDENT_KEY='toeic_student_session';
function getStudentSession(){
  try{
    const raw=localStorage.getItem(STUDENT_KEY);
    return raw?JSON.parse(raw):null;
  }catch(e){
    return null;
  }
}
function requireStudentSession(){
  const student=getStudentSession();
  if(!student||!student.email){
    alert('Bạn cần đăng nhập bằng email đã được cấp quyền trước khi làm bài.');
    location.href='index.html';
    return null;
  }
  return student;
}

let resultSubmitted=false;
function logoutStudent(){
  localStorage.removeItem(STUDENT_KEY);
  location.href='index.html';
}
function collectResultPayload(){
  const student=getStudentSession()||{};
  const submittedAt=new Date().toISOString();
  let score=0;
  const answers=quizData.map(function(item,index){
    const selectedEl=document.querySelector('input[name="'+CSS.escape(item.id)+'"]:checked');
    const selected=selectedEl?selectedEl.value:null;
    const selectedOption=item.options.find(opt=>opt.key===selected)||null;
    const correctOption=item.options.find(opt=>opt.key===item.answer)||null;
    const correct=selected===item.answer;
    if(correct) score++;
    return {
      no:index+1,
      id:item.id,
      questionEn:item.questionEn,
      questionVn:item.questionVn,
      selected:selected,
      selectedText:selectedOption?selectedOption.text:null,
      correctAnswer:item.answer,
      correctText:correctOption?correctOption.text:null,
      isCorrect:correct,
      checkedBeforeSubmit:Object.prototype.hasOwnProperty.call(checkedAnswers,item.id)
    };
  });
  return {
    student:{email:student.email||'', loginAt:student.loginAt||''},
    quiz:{id:'be-adj-v3-v-ed-prep-1', title:'Be + Adj/V3/-ed + Prep 1 - 52 câu', total:quizData.length},
    submittedAt,
    score,
    total:quizData.length,
    percent:Math.round(score/quizData.length*100),
    answers
  };
}
function showFinalResultPreview(){
  const student=requireStudentSession();
  if(!student) return;
  const payload=collectResultPayload();
  const scoreEl=document.getElementById('finalScoreText');
  const metaEl=document.getElementById('finalMetaText');
  const statusEl=document.getElementById('submitStatus');
  const submitBtn=document.getElementById('submitResultBtn');
  if(scoreEl) scoreEl.innerHTML='<b>Điểm của bạn:</b> '+payload.score+' / '+payload.total+' ('+payload.percent+'%)';
  if(metaEl) metaEl.textContent='Email: '+payload.student.email+' · Các câu chưa chọn đáp án được tính là sai.';
  if(statusEl && !resultSubmitted){
    statusEl.className='submit-status';
    statusEl.innerHTML='Bấm <b>Nộp kết quả</b> để lưu bài làm.';
  }
  if(submitBtn && !resultSubmitted){
    submitBtn.style.display='inline-block';
    submitBtn.disabled=false;
    submitBtn.textContent='Nộp kết quả';
  }
}
async function submitFinalResult(){
  if(resultSubmitted) return;
  const student=requireStudentSession();
  if(!student) return;
  const payload=collectResultPayload();
  const scoreEl=document.getElementById('finalScoreText');
  const metaEl=document.getElementById('finalMetaText');
  const statusEl=document.getElementById('submitStatus');
  const submitBtn=document.getElementById('submitResultBtn');
  if(scoreEl) scoreEl.innerHTML='<b>Điểm của bạn:</b> '+payload.score+' / '+payload.total+' ('+payload.percent+'%)';
  if(metaEl) metaEl.textContent='Email: '+payload.student.email+' · Nộp lúc: '+new Date(payload.submittedAt).toLocaleString('vi-VN');
  if(submitBtn){
    submitBtn.disabled=true;
    submitBtn.textContent='Đang nộp...';
  }
  if(statusEl){statusEl.className='submit-status';statusEl.textContent='Đang lưu kết quả...';}
  try{
    const res=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(!res.ok||!data.ok) throw new Error(data.error||'Không lưu được kết quả');
    resultSubmitted=true;
    if(statusEl){statusEl.className='submit-status ok';statusEl.textContent='Đã lưu kết quả thành công. Mã bài nộp: '+data.id;}
    if(submitBtn){submitBtn.style.display='none';}
  }catch(err){
    if(statusEl){statusEl.className='submit-status err';statusEl.textContent='Không thể lưu lên. Kiểm tra KV binding / mạng rồi bấm Nộp kết quả lại.';}
    if(submitBtn){
      submitBtn.disabled=false;
      submitBtn.textContent='Nộp kết quả';
      submitBtn.style.display='inline-block';
    }
    const oldLink=document.getElementById('downloadResultJson');
    if(oldLink) oldLink.remove();
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='student_result_'+(payload.student.email||'student').replace(/[^a-z0-9._-]/gi,'_')+'_'+Date.now()+'.json';
    a.textContent='Tải JSON kết quả dự phòng';
    a.className='nav-btn';
    a.id='downloadResultJson';
    a.style.display='inline-block';
    a.style.marginTop='14px';
    statusEl?.insertAdjacentElement('afterend',a);
  }
}

document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();goReveal();}
  if(e.code==='ArrowRight')nextSlide();
  if(e.code==='ArrowLeft')prevSlide();
  if(e.code==='Escape')closePagePicker();
});
setupQuestionTranslationButtons();
updateProgress();

</script>

<script>
(function(){
  'use strict';
  document.documentElement.classList.add('anti-download-lock');

  const block = function(e){
    e.preventDefault();
    e.stopPropagation();
    return false;
  };

  // Khóa chuột phải, kéo-thả, chọn/copy/cut/paste/in/trình đơn lưu phổ biến
  ['contextmenu','dragstart','drop','copy','cut','paste','selectstart'].forEach(function(evt){
    document.addEventListener(evt, block, true);
  });

  document.addEventListener('keydown', function(e){
    const key = String(e.key || '').toLowerCase();
    const ctrlOrCmd = e.ctrlKey || e.metaKey;

    // F12
    if(e.key === 'F12') return block(e);

    // Ctrl/Cmd + S/U/P/O/A/C/X/V
    if(ctrlOrCmd && ['s','u','p','o','a','c','x','v'].includes(key)) return block(e);

    // Ctrl/Cmd + Shift + I/J/C/S
    if(ctrlOrCmd && e.shiftKey && ['i','j','c','s'].includes(key)) return block(e);
  }, true);

  // Hạn chế kéo media/link ra ngoài để tải
  document.addEventListener('mousedown', function(e){
    if(e.button === 2) return block(e);
  }, true);
})();
</script>
