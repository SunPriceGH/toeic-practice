/* ===== Refinement: table + warning-box thanh thoát hơn ===== */
.intro-box:has(table){
  padding:24px 26px;
  overflow:hidden;
}
table{
  border-collapse:separate!important;
  border-spacing:0!important;
  overflow:hidden;
  border-radius:18px;
  border:1px solid #d8e2f0;
  background:#fff;
  box-shadow:0 10px 24px rgba(15,23,42,.055);
  font-size:20px!important;
  font-weight:500!important;
  letter-spacing:.01em;
}
th{
  background:linear-gradient(135deg,#1d4ed8,#0ea5e9)!important;
  color:#fff;
  padding:14px 16px!important;
  font-size:17px;
  line-height:1.35;
  font-weight:850!important;
  letter-spacing:.02em;
  border:none!important;
}
td{
  padding:13px 16px!important;
  border:none!important;
  border-top:1px solid #e5edf7!important;
  color:#334155;
  line-height:1.48!important;
  font-weight:500!important;
}
td:first-child{
  color:#1e3a8a;
  font-weight:750!important;
}
tr:nth-child(even) td{background:#f8fbff}
tr:hover td{background:#eff6ff}
.warning-box{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-start;
  gap:14px;
  background:linear-gradient(135deg,#fff7ed,#fffaf3)!important;
  border:1px solid #fed7aa!important;
  border-left:7px solid #f97316!important;
  color:#7c2d12!important;
  border-radius:20px!important;
  padding:18px 22px!important;
  font-size:21px!important;
  line-height:1.58!important;
  font-weight:550!important;
  box-shadow:0 10px 24px rgba(249,115,22,.08);
}
.warning-box::before{
  content:"!";
  flex:0 0 auto;
  width:30px;
  height:30px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#ffedd5;
  color:#c2410c;
  font-size:18px;
  font-weight:950;
  margin-top:2px;
}
.warning-box b{
  color:#9a3412;
  font-weight:850;
}
.reveal.show{
  transition:opacity .38s ease, transform .38s ease, filter .38s ease;
}
@media(max-width:768px){
  .intro-box:has(table){padding:18px 16px;overflow-x:auto}
  table{font-size:16px!important;min-width:620px}
  th{font-size:15px;padding:11px 12px!important}
  td{padding:10px 12px!important;line-height:1.42!important}
  .warning-box{font-size:18px!important;padding:15px 16px!important;gap:10px}
  .warning-box::before{width:26px;height:26px;font-size:16px}
}

/* ===== Compact note: dùng cho lưu ý ngắn, tránh warning-box quá nặng ===== */
.note-box{
  display:flex;
  align-items:flex-start;
  gap:12px;
  width:fit-content;
  max-width:920px;
  margin-top:18px;
  padding:14px 18px;
  border:1px solid #fed7aa;
  border-left:5px solid #f97316;
  border-radius:16px;
  background:linear-gradient(135deg,#fffaf3,#fff7ed);
  color:#7c2d12;
  font-size:20px;
  line-height:1.55;
  font-weight:500;
  box-shadow:0 8px 20px rgba(249,115,22,.07);
}
.note-box .note-label{
  flex:0 0 auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 10px;
  border-radius:999px;
  background:#ffedd5;
  color:#c2410c;
  font-size:14px;
  line-height:1;
  font-weight:850;
  letter-spacing:.02em;
  margin-top:3px;
}
.note-box b{
  color:#9a3412;
  font-weight:850;
}

.note-box.note-lines{align-items:flex-start}
.note-box .note-content{display:flex;flex-direction:column;gap:5px;line-height:1.45}
.note-box .note-content span{display:block}
@media(max-width:768px){
  .note-box{width:100%;font-size:18px;padding:13px 14px;gap:10px}
  .note-box .note-label{font-size:13px;padding:5px 9px}
}


/* Khi chưa chọn đáp án: chỉ hiện cảnh báo, không hiện lời giải */
.result-box.no-answer .explain{display:none!important}
.result-box.no-answer{background:#fff7ed!important;border-color:#fed7aa!important}
.result-box.no-answer .result-title{margin-bottom:0!important}

.translation-box{
  display:none;
  background:linear-gradient(135deg,#f8fafc,#eef6ff);
  border:2px solid #dbeafe;
  border-left:8px solid #60a5fa;
  border-radius:20px;
  padding:22px 26px;
  margin-top:16px;
  box-shadow:0 10px 24px rgba(37,99,235,.08);
  animation:fadeUp .25s ease;
}
.translation-box.show{display:block}
.translation-box h3{
  color:#1d4ed8;
  font-size:24px;
  margin-bottom:12px;
}
.translation-list{
  display:grid;
  gap:10px;
  margin-top:8px;
}
.translation-item{
  background:#fff;
  border:1.5px solid #dbeafe;
  border-radius:14px;
  padding:12px 14px;
  font-size:20px;
  line-height:1.45;
  color:#334155;
}
.translation-item b{color:#0f172a}
.translation-item .letter{color:#1d4ed8;font-weight:1000;margin-right:6px}
@media(max-width:768px){.translation-box{padding:18px}.translation-item{font-size:18px}.translation-box h3{font-size:22px}}


/* ===== En/Vn question translation pill ===== */
.sample-title.question-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lang-pill{
  border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  min-width:72px;height:34px;padding:0 13px;border-radius:999px;
  background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;
  font-size:13px;font-weight:1000;letter-spacing:.3px;
  box-shadow:0 8px 16px rgba(37,99,235,.20);transition:.2s ease;
}
.lang-pill:hover{transform:translateY(-1px) scale(1.03);filter:brightness(1.04)}
.lang-pill.active{background:linear-gradient(135deg,#0f766e,#14b8a6)}
.question-vn{
  display:none;margin-top:12px;padding:14px 16px;border-radius:16px;
  background:#f8fafc;border:2px solid #dbeafe;color:#334155;
  font-size:21px;line-height:1.45;font-weight:700;
}
.question-vn.show{display:block;animation:fadeUp .22s ease}
.question-vn .vn-label{font-weight:1000;color:#1d4ed8;margin-right:8px}

/* ===== Progress as page picker button ===== */
.progress-btn{border:none;cursor:pointer;pointer-events:auto}
.progress-btn:hover{background:#eff6ff;color:#1d4ed8;transform:translateY(-1px)}
.page-picker-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:300;
  display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);
}
.page-picker-overlay.show{display:flex}
.page-picker-panel{
  width:min(880px,96vw);max-height:84vh;overflow:auto;background:#fff;border-radius:26px;
  border:2px solid #dbeafe;box-shadow:0 24px 60px rgba(15,23,42,.24);padding:22px;
}
.page-picker-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.page-picker-head h3{margin:0;color:#0f172a;font-size:28px}
.page-picker-head p{margin:6px 0 0;color:#64748b;font-size:17px;line-height:1.4}
.page-picker-close{
  border:none;cursor:pointer;width:40px;height:40px;border-radius:999px;background:#e2e8f0;
  color:#0f172a;font-size:28px;line-height:1;font-weight:800;
}
.page-picker-close:hover{background:#cbd5e1}
.page-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.page-jump-btn{
  border:2px solid #dbeafe;border-radius:16px;background:#f8fafc;color:#0f172a;
  padding:10px 8px;min-height:58px;cursor:pointer;text-align:left;transition:.18s ease;
  font-size:14px;font-weight:900;line-height:1.25;
}
.page-jump-btn:hover{border-color:#93c5fd;background:#eff6ff;transform:translateY(-1px)}
.page-jump-btn.active{border-color:#2563eb;background:#dbeafe;color:#1d4ed8}
.page-jump-btn .page-no{display:block;font-size:18px;font-weight:1000}
.page-jump-btn .page-title{display:block;color:#64748b;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:768px){.question-vn{font-size:18px}.lang-pill{height:32px;min-width:66px;font-size:12px}.page-picker-panel{padding:18px;border-radius:20px}.page-picker-grid{grid-template-columns:repeat(auto-fill,minmax(74px,1fr))}.page-jump-btn{min-height:54px;font-size:12px}.page-picker-head h3{font-size:24px}}



/* ===== Word-form option POS badge: only inside translation box ===== */
.translation-item .option-pos{
  font-size:14px;
  font-weight:900;
  color:#64748b;
  background:#f1f5f9;
  border:1px solid #e2e8f0;
  padding:4px 8px;
  border-radius:999px;
  margin-left:8px;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  vertical-align:middle;
}
@media(max-width:768px){
  .translation-item .option-pos{font-size:12px;margin-left:6px}
}


.submit-status{margin-top:14px;font-size:20px;line-height:1.5;color:#334155;font-weight:700}
.submit-status.ok{color:#15803d}.submit-status.err{color:#be123c}
.logout-link{position:fixed;top:24px;left:36px;z-index:121;border:none;border-radius:999px;background:#f8fafc;color:#334155;border:2px solid #dbeafe;padding:8px 13px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 6px 14px rgba(15,23,42,.08)}
.logout-link:hover{background:#eff6ff;color:#1d4ed8}
@media(max-width:768px){.logout-link{top:14px;left:14px;font-size:12px;padding:7px 10px}.submit-status{font-size:18px}}

</style>

const quizDataMap=Object.fromEntries(quizData.map(item=>[item.id,item]));

function finalResultSlide(){
  return '<section class="slide result-slide">'
    + '<div class="slide-label">Hoàn thành</div>'
    + '<h2>Kết quả 100 câu từ loại TOEIC</h2>'
    + '<div class="content-area">'
    + '<div class="intro-box"><p id="finalScoreText"><b>Điểm của bạn:</b> đang tính...</p><p id="finalMetaText">Các câu chưa chọn đáp án sẽ tự tính là sai.</p><p class="submit-status" id="submitStatus">Bấm <b>Nộp kết quả</b> để lưu bài làm.</p><button class="nav-btn" id="submitResultBtn" type="button" onclick="submitFinalResult()" style="display:inline-block;margin-top:12px">Nộp kết quả</button></div>'
    + '<div class="method-box"><h3>Ghi chú</h3><ul class="steps"><li>Câu chưa chọn đáp án = sai.</li></ul></div>'
    + '</div></section>';
}

function renderQuizSlides(){
  const mount=document.getElementById('quizMount');
  if(!mount||mount.dataset.rendered==='1') return;
  mount.outerHTML=quizData.map(function(item,index){
    const optionsHtml=item.options.map(function(opt){
      return '<label class="option"><input name="'+escapeHtml(item.id)+'" type="radio" value="'+escapeHtml(opt.key)+'"><span class="option-letter">'+escapeHtml(opt.key)+'.</span><span>'+escapeHtml(opt.text)+'</span></label>';
    }).join('');
    const translationsHtml=item.options.map(function(opt){
      return '<div class="translation-item"><span class="letter">'+escapeHtml(opt.key)+'.</span><b>'+escapeHtml(opt.text)+'</b> = '+escapeHtml(opt.vn)+' <span class="option-pos">'+escapeHtml(opt.pos)+'</span></div>';
    }).join('');
    const correctOption=item.options.find(opt=>opt.key===item.answer) || {text:''};
    return '<section class="slide quiz-slide'+(index===0?' active':'')+'" data-question="'+escapeHtml(item.id)+'">'
      + '<div class="slide-label">'+escapeHtml(item.label)+'</div>'
      + '<h2>'+escapeHtml(item.title)+'</h2>'
      + '<p class="category-note">'+escapeHtml(item.category)+'</p>'
      + '<div class="content-area">'
      + '<div class="sample-box"><div class="sample-title">Question</div><div class="question">'+escapeHtml(item.questionEn)+'</div><div class="options">'+optionsHtml+'</div></div>'
      + '<div class="method-box result-box" id="result-'+escapeHtml(item.id.replace(/^q/,''))+'"><h3 class="result-title"></h3><p class="explain"><span class="answer-key">Đáp án đúng: '+escapeHtml(item.answer)+'. '+escapeHtml(correctOption.text)+'</span> — '+escapeHtml(item.explanation)+'</p></div>'
      + '<div class="translation-box"><h3>Dịch nghĩa 4 đáp án</h3><div class="translation-list">'+translationsHtml+'</div></div>'
      + '</div></section>';
  }).join('\n') + '\n' + finalResultSlide();
}

const slides=[...document.querySelectorAll('.slide')];
const progressText=document.getElementById('progressText');
const topLine=document.getElementById('topLine');
const checkBtn=document.getElementById('checkBtn');
let currentSlide=0;
let revealIndex=0;
const checkedAnswers={};
const totalQuestions=quizData.length;
function updateProgress(){
  progressText.textContent=(currentSlide+1)+' / '+slides.length;
  topLine.style.width=((currentSlide+1)/slides.length*100)+'%';
  updateCheckState();
  syncPagePickerActive();
}
function resetSlideReveal(slide){
  slide.querySelectorAll('.reveal').forEach(el=>el.classList.remove('show'));
}
function showSlide(index){
  if(index<0||index>=slides.length) return;
  slides[currentSlide].classList.remove('active');
  resetSlideReveal(slides[currentSlide]);
  currentSlide=index;
  revealIndex=0;
  slides[currentSlide].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  updateProgress();
  if(slides[currentSlide].classList.contains('result-slide')) showFinalResultPreview();
}
function goReveal(){
  const activeSlide=slides[currentSlide];
  const revealItems=activeSlide.querySelectorAll('.reveal');
  if(revealIndex<revealItems.length){
    const item=revealItems[revealIndex];
    item.classList.add('show');
    revealIndex++;
    setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),80);
    return;
  }
}
function nextSlide(){if(currentSlide<slides.length-1)showSlide(currentSlide+1);}
function prevSlide(){if(currentSlide>0)showSlide(currentSlide-1);}
function updateCheckState(){
  const slide=slides[currentSlide];
  const isQuiz=slide.classList.contains('quiz-slide');
  checkBtn.style.display=isQuiz?'inline-block':'none';
}
function lockCurrentQuestion(slide){
  slide.classList.add('answer-locked');
  slide.querySelectorAll('input[type="radio"]').forEach(input=>{
    input.disabled=true;
  });
}
function checkAnswer(){
  const slide=slides[currentSlide];
  if(!slide.classList.contains('quiz-slide')) return;
  const qName=slide.dataset.question;
  const item=quizDataMap[qName];
  if(!item) return;
  const answer=item.answer;
  const selected=slide.querySelector('input[name="'+qName+'"]:checked');
  const resultBox=slide.querySelector('.result-box');
  const title=slide.querySelector('.result-title');
  const translationBox=slide.querySelector('.translation-box');

  if(slide.classList.contains('answer-locked')){
    if(resultBox) resultBox.classList.add('show');
    if(translationBox) translationBox.classList.add('show');
    return;
  }

  if(!selected){
    resultBox.classList.remove('wrong-box');
    resultBox.classList.add('show','no-answer');
    if(translationBox) translationBox.classList.remove('show');
    title.innerHTML='<span class="wrong-text">Hãy chọn một đáp án trước.</span>';
    setTimeout(()=>resultBox.scrollIntoView({behavior:'smooth',block:'center'}),80);
    return;
  }
  resultBox.classList.remove('no-answer');
  const isCorrect=selected.value===answer;
  checkedAnswers[qName]=isCorrect;
  lockCurrentQuestion(slide);
  resultBox.classList.toggle('wrong-box',!isCorrect);
  resultBox.classList.add('show');
  if(translationBox) translationBox.classList.add('show');
  title.innerHTML=isCorrect?'<span class="correct-text">✓ Chính xác!</span>':'<span class="wrong-text">✗ Chưa đúng.</span>';
  setTimeout(()=>resultBox.scrollIntoView({behavior:'smooth',block:'center'}),80);
}

function setupQuestionTranslationButtons(){
  slides.forEach(slide=>{
    if(!slide.classList.contains('quiz-slide')) return;
    const qName=slide.dataset.question;
    const sampleTitle=slide.querySelector('.sample-title');
    const question=slide.querySelector('.question');
    const item=quizDataMap[qName];
    if(!sampleTitle||!question||!item||!item.questionVn) return;
    sampleTitle.classList.add('question-row');
    if(sampleTitle.querySelector('.lang-pill')) return;
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='lang-pill';
    btn.textContent='En | Vn';
    btn.onclick=function(){toggleQuestionTranslation(btn)};
    sampleTitle.appendChild(btn);
    const vn=document.createElement('div');
    vn.className='question-vn';
    vn.innerHTML='<span class="vn-label">VN:</span>'+escapeHtml(item.questionVn);
    question.insertAdjacentElement('afterend',vn);
  });
}
function toggleQuestionTranslation(btn){
  const sampleBox=btn.closest('.sample-box');
  const vn=sampleBox?sampleBox.querySelector('.question-vn'):null;
  if(!vn) return;
  vn.classList.toggle('show');
  btn.classList.toggle('active',vn.classList.contains('show'));
}
function buildPagePicker(){
  const grid=document.getElementById('pagePickerGrid');
  if(!grid||grid.dataset.ready==='1') return;
  slides.forEach((slide,index)=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='page-jump-btn';
    const title=(slide.querySelector('h1,h2')?.textContent||'Slide').trim();
    const label=(slide.querySelector('.slide-label')?.textContent||'').trim();
    btn.innerHTML='<span class="page-no">'+(index+1)+'</span><span class="page-title">'+(label||title)+'</span>';
    btn.onclick=function(){showSlide(index);closePagePicker();};
    grid.appendChild(btn);
  });
  grid.dataset.ready='1';
}
function syncPagePickerActive(){
  const buttons=document.querySelectorAll('.page-jump-btn');
  buttons.forEach((btn,i)=>btn.classList.toggle('active',i===currentSlide));
}
function openPagePicker(){
  buildPagePicker();
  syncPagePickerActive();
  document.getElementById('pagePicker')?.classList.add('show');
}
function closePagePicker(event){
  if(event&&event.target&&event.target.id!=='pagePicker') return;
  document.getElementById('pagePicker')?.classList.remove('show');
}



const STUDENT_KEY='toeic_student_session';
function getStudentSession(){
  try{
    const raw=localStorage.getItem(STUDENT_KEY);
    return raw?JSON.parse(raw):null;
  }catch(e){
    return null;
  }
}
function requireStudentSession(){
  const student=getStudentSession();
  if(!student||!student.email){
    alert('Bạn cần đăng nhập bằng email đã được cấp quyền trước khi làm bài.');
    location.href='index.html';
    return null;
  }
  return student;
}

let resultSubmitted=false;
function logoutStudent(){
  localStorage.removeItem(STUDENT_KEY);
  location.href='index.html';
}
function collectResultPayload(){
  const student=getStudentSession()||{};
  const submittedAt=new Date().toISOString();
  let score=0;
  const answers=quizData.map(function(item,index){
    const selectedEl=document.querySelector('input[name="'+CSS.escape(item.id)+'"]:checked');
    const selected=selectedEl?selectedEl.value:null;
    const selectedOption=item.options.find(opt=>opt.key===selected)||null;
    const correctOption=item.options.find(opt=>opt.key===item.answer)||null;
    const correct=selected===item.answer;
    if(correct) score++;
    return {
      no:index+1,
      id:item.id,
      questionEn:item.questionEn,
      questionVn:item.questionVn,
      selected:selected,
      selectedText:selectedOption?selectedOption.text:null,
      correctAnswer:item.answer,
      correctText:correctOption?correctOption.text:null,
      isCorrect:correct,
      checkedBeforeSubmit:Object.prototype.hasOwnProperty.call(checkedAnswers,item.id)
    };
  });
  return {
    student:{email:student.email||'', loginAt:student.loginAt||''},
    quiz:{id:'toeic-part5-word-form-100', title:'TOEIC Part 5 Word Form Practice - 100 câu', total:quizData.length},
    submittedAt,
    score,
    total:quizData.length,
    percent:Math.round(score/quizData.length*100),
    answers
  };
}
function showFinalResultPreview(){
  const student=requireStudentSession();
  if(!student) return;
  const payload=collectResultPayload();
  const scoreEl=document.getElementById('finalScoreText');
  const metaEl=document.getElementById('finalMetaText');
  const statusEl=document.getElementById('submitStatus');
  const submitBtn=document.getElementById('submitResultBtn');
  if(scoreEl) scoreEl.innerHTML='<b>Điểm của bạn:</b> '+payload.score+' / '+payload.total+' ('+payload.percent+'%)';
  if(metaEl) metaEl.textContent='Email: '+payload.student.email+' · Các câu chưa chọn đáp án được tính là sai.';
  if(statusEl && !resultSubmitted){
    statusEl.className='submit-status';
    statusEl.innerHTML='Bấm <b>Nộp kết quả</b> để lưu bài làm.';
  }
  if(submitBtn && !resultSubmitted){
    submitBtn.style.display='inline-block';
    submitBtn.disabled=false;
    submitBtn.textContent='Nộp kết quả';
  }
}
async function submitFinalResult(){
  if(resultSubmitted) return;
  const student=requireStudentSession();
  if(!student) return;
  const payload=collectResultPayload();
  const scoreEl=document.getElementById('finalScoreText');
  const metaEl=document.getElementById('finalMetaText');
  const statusEl=document.getElementById('submitStatus');
  const submitBtn=document.getElementById('submitResultBtn');
  if(scoreEl) scoreEl.innerHTML='<b>Điểm của bạn:</b> '+payload.score+' / '+payload.total+' ('+payload.percent+'%)';
  if(metaEl) metaEl.textContent='Email: '+payload.student.email+' · Nộp lúc: '+new Date(payload.submittedAt).toLocaleString('vi-VN');
  if(submitBtn){
    submitBtn.disabled=true;
    submitBtn.textContent='Đang nộp...';
  }
  if(statusEl){statusEl.className='submit-status';statusEl.textContent='Đang lưu kết quả...';}
  try{
    const res=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(!res.ok||!data.ok) throw new Error(data.error||'Không lưu được kết quả');
    resultSubmitted=true;
    if(statusEl){statusEl.className='submit-status ok';statusEl.textContent='Đã lưu kết quả thành công. Mã bài nộp: '+data.id;}
    if(submitBtn){submitBtn.style.display='none';}
  }catch(err){
    if(statusEl){statusEl.className='submit-status err';statusEl.textContent='Không thể lưu lên. Kiểm tra KV binding / mạng rồi bấm Nộp kết quả lại.';}
    if(submitBtn){
      submitBtn.disabled=false;
      submitBtn.textContent='Nộp kết quả';
      submitBtn.style.display='inline-block';
    }
    const oldLink=document.getElementById('downloadResultJson');
    if(oldLink) oldLink.remove();
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='student_result_'+(payload.student.email||'student').replace(/[^a-z0-9._-]/gi,'_')+'_'+Date.now()+'.json';
    a.textContent='Tải JSON kết quả dự phòng';
    a.className='nav-btn';
    a.id='downloadResultJson';
    a.style.display='inline-block';
    a.style.marginTop='14px';
    statusEl?.insertAdjacentElement('afterend',a);
  }
}

document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();goReveal();}
  if(e.code==='ArrowRight')nextSlide();
  if(e.code==='ArrowLeft')prevSlide();
  if(e.code==='Escape')closePagePicker();
});
setupQuestionTranslationButtons();
updateProgress();
